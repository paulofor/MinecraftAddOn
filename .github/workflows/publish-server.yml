name: Publicar no servidor VPS

on:
  workflow_dispatch:
  push:
    branches:
      - work
      - main
    paths:
      - 'packs/**'
      - 'infra/**'
      - 'tools/**'
      - 'docker-compose.log-viewer.yml'
      - 'docker-compose.mcp-bedrock-readonly.yml'
      - '.github/workflows/publish-server.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: 186.202.209.206
      VPS_USER: root
      VPS_PORT: 22
      REMOTE_DIR: ${{ vars.VPS_DESTINO || '/root/MinecraftAddOn' }}
      WORLD_DIR: ${{ vars.BEDROCK_WORLD_DIR || '/root/MinecraftServer/worlds/Bedrock level' }}
      WORLD_BP_DIR: ${{ vars.BEDROCK_WORLD_BP_DIR || '/root/MinecraftServer/worlds/Bedrock level/behavior_packs' }}
      WORLD_RP_DIR: ${{ vars.BEDROCK_WORLD_RP_DIR || '/root/MinecraftServer/worlds/Bedrock level/resource_packs' }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar dependência (rsync)
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Configurar chave SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Preparar pasta remota
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "mkdir -p '$REMOTE_DIR/packs' '$REMOTE_DIR/infra/log-viewer' '$REMOTE_DIR/infra/mcp-bedrock-readonly' '$REMOTE_DIR/tools' '$WORLD_BP_DIR' '$WORLD_RP_DIR'"

      - name: Publicar packs no servidor
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p $VPS_PORT" \
            packs/ "$VPS_USER@$VPS_HOST:$REMOTE_DIR/packs/"

      - name: Publicar log viewer no servidor
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p $VPS_PORT" \
            infra/log-viewer/ "$VPS_USER@$VPS_HOST:$REMOTE_DIR/infra/log-viewer/"

          rsync -az \
            -e "ssh -i ~/.ssh/id_ed25519 -p $VPS_PORT" \
            docker-compose.log-viewer.yml "$VPS_USER@$VPS_HOST:$REMOTE_DIR/docker-compose.log-viewer.yml"

          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p $VPS_PORT" \
            infra/mcp-bedrock-readonly/ "$VPS_USER@$VPS_HOST:$REMOTE_DIR/infra/mcp-bedrock-readonly/"

          rsync -az \
            -e "ssh -i ~/.ssh/id_ed25519 -p $VPS_PORT" \
            docker-compose.mcp-bedrock-readonly.yml "$VPS_USER@$VPS_HOST:$REMOTE_DIR/docker-compose.mcp-bedrock-readonly.yml"

          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p $VPS_PORT" \
            tools/ "$VPS_USER@$VPS_HOST:$REMOTE_DIR/tools/"

      - name: Promover packs para o mundo Bedrock
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "set -euo pipefail && \
             bp_found=0 && \
             for src in '$REMOTE_DIR'/packs/BP_*; do \
               [ -d \"\$src\" ] || continue; \
               bp_found=1; \
               name=\$(basename \"\$src\"); \
               rsync -azc --delete --itemize-changes \"\$src/\" '$WORLD_BP_DIR'/\"\$name/\"; \
             done && \
             rp_found=0 && \
             for src in '$REMOTE_DIR'/packs/RP_*; do \
               [ -d \"\$src\" ] || continue; \
               rp_found=1; \
               name=\$(basename \"\$src\"); \
               rsync -azc --delete --itemize-changes \"\$src/\" '$WORLD_RP_DIR'/\"\$name/\"; \
             done && \
             [ \"\$bp_found\" -eq 1 ] && \
             [ \"\$rp_found\" -eq 1 ]"

      - name: Vincular automaticamente os packs ao mundo
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "REMOTE_DIR='$REMOTE_DIR' WORLD_DIR='$WORLD_DIR' python3 -" <<'PY'
          import json
          import os
          from pathlib import Path

          remote_dir = Path(os.environ["REMOTE_DIR"])
          world_dir = Path(os.environ["WORLD_DIR"])

          bp_manifests = sorted((remote_dir / "packs").glob("BP_*/manifest.json"))
          rp_manifests = sorted((remote_dir / "packs").glob("RP_*/manifest.json"))
          world_bp_file = world_dir / "world_behavior_packs.json"
          world_rp_file = world_dir / "world_resource_packs.json"

          if not bp_manifests:
              raise RuntimeError("Nenhum manifest BP_* encontrado em packs/.")
          if not rp_manifests:
              raise RuntimeError("Nenhum manifest RP_* encontrado em packs/.")

          def load_manifest(path: Path):
              data = json.loads(path.read_text(encoding="utf-8"))
              header = data.get("header", {})
              pack_id = header.get("uuid")
              version = header.get("version")
              if not pack_id or not isinstance(version, list):
                  raise ValueError(f"Manifest inválido: {path}")
              return pack_id, version

          def load_world_bindings(path: Path):
              if not path.exists():
                  return []
              data = json.loads(path.read_text(encoding="utf-8"))
              return data if isinstance(data, list) else []

          def upsert_binding(bindings, pack_id, version):
              next_bindings = [entry for entry in bindings if entry.get("pack_id") != pack_id]
              next_bindings.append({"pack_id": pack_id, "version": version})
              return next_bindings

          world_bp = load_world_bindings(world_bp_file)
          for bp_manifest in bp_manifests:
              bp_id, bp_version = load_manifest(bp_manifest)
              world_bp = upsert_binding(world_bp, bp_id, bp_version)
              print(f"[ok] BP vinculado: {bp_manifest.parent.name} {bp_id} {bp_version}")

          world_rp = load_world_bindings(world_rp_file)
          for rp_manifest in rp_manifests:
              rp_id, rp_version = load_manifest(rp_manifest)
              world_rp = upsert_binding(world_rp, rp_id, rp_version)
              print(f"[ok] RP vinculado: {rp_manifest.parent.name} {rp_id} {rp_version}")

          world_bp_file.write_text(
              json.dumps(world_bp, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          world_rp_file.write_text(
              json.dumps(world_rp, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          print("[ok] world_behavior_packs.json atualizado.")
          print("[ok] world_resource_packs.json atualizado.")
          PY


      - name: Publicar log viewer + MCP via Docker no mesmo host
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "set -euo pipefail && \
             cd '$REMOTE_DIR' && \
             export VIEWER_PORT='8081' && \
             export BEDROCK_LOG_PATH='/root/MinecraftServer/logging' && \
             export WORLD_DIR='$WORLD_DIR' && \
             export WORLD_BP_DIR='$WORLD_BP_DIR' && \
             export WORLD_RP_DIR='$WORLD_RP_DIR' && \
             export BEDROCK_ROOT='/root/MinecraftServer' && \
             export HOST_LOG_DIR='/root/MinecraftServer/logging' && \
             export HOST_REPO_DIR='$REMOTE_DIR' && \
             mkdir -p \"\$HOST_LOG_DIR\" && \
             if [ -d \"\$BEDROCK_LOG_PATH\" ]; then \
               BEDROCK_LOG_FILE=\"\${BEDROCK_LOG_PATH%/}/bedrock.log\"; \
             else \
               BEDROCK_LOG_FILE=\"\$BEDROCK_LOG_PATH\"; \
             fi && \
             if [ ! -e \"\$BEDROCK_LOG_FILE\" ]; then \
               touch \"\$BEDROCK_LOG_FILE\"; \
             fi && \
             if [ ! -f \"\$BEDROCK_LOG_FILE\" ]; then \
               echo '[erro] BEDROCK_LOG_PATH não aponta para um arquivo de log válido.' >&2; \
               exit 1; \
             fi && \
             export BEDROCK_LOG_PATH=\"\$BEDROCK_LOG_FILE\" && \
             docker compose -f docker-compose.log-viewer.yml -f docker-compose.mcp-bedrock-readonly.yml config >/dev/null && \
             docker compose -f docker-compose.log-viewer.yml -f docker-compose.mcp-bedrock-readonly.yml up -d --build --remove-orphans && \
             docker ps --filter name=bedrock-log-viewer --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' && \
             docker ps --filter name=bedrock-mcp-readonly --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'"

      - name: Reiniciar servidor Bedrock no host remoto
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "set -euo pipefail && \
             if command -v systemctl >/dev/null 2>&1; then \
               echo '[info] Reiniciando bedrock.service via systemd'; \
               if (command -v sudo >/dev/null 2>&1 && sudo -n systemctl restart bedrock.service && sudo -n systemctl is-active --quiet bedrock.service) || \
                  (systemctl restart bedrock.service && systemctl is-active --quiet bedrock.service); then \
                 restarted=1; \
               fi; \
             fi; \
             if [ \"\${restarted:-0}\" -ne 1 ] && command -v docker >/dev/null 2>&1; then \
               container_name=\$(docker ps -a --format '{{.Names}}' | grep -E '^bedrock$|bedrock-server|minecraft.*bedrock' | head -n 1 || true); \
               if [ -n \"\$container_name\" ]; then \
                 echo \"[info] Reiniciando container \$container_name via docker\"; \
                 docker restart \"\$container_name\" >/dev/null; \
                 restarted=1; \
               fi; \
             fi; \
             if [ \"\${restarted:-0}\" -ne 1 ]; then \
               bedrock_root=''; \
               for candidate in /opt/bedrock-server /root/MinecraftServer; do \
                 if [ -x \"\$candidate/bedrock_server\" ]; then \
                   bedrock_root=\"\$candidate\"; \
                   break; \
                 fi; \
               done; \
               if [ -n \"\$bedrock_root\" ]; then \
                 echo \"[info] Reiniciando binário bedrock_server manualmente em \$bedrock_root\"; \
                 pkill -f '/opt/bedrock-server/bedrock_server|/root/MinecraftServer/bedrock_server' || true; \
                 cd \"\$bedrock_root\" && \
                 mkdir -p logging && \
                 nohup ./bedrock_server > logging/bedrock.log 2>&1 < /dev/null & \
                 sleep 2; \
                 restarted=1; \
               fi; \
             fi; \
             if [ \"\${restarted:-0}\" -ne 1 ]; then \
               echo '[info] Diagnóstico: serviços systemd candidatos'; \
               systemctl list-unit-files --type=service --all | grep -Ei 'bedrock|minecraft' || true; \
               echo '[info] Diagnóstico: containers docker candidatos'; \
               docker ps -a --format '{{.Names}}' | grep -Ei 'bedrock|minecraft' || true; \
               echo '[erro] Não foi possível identificar como reiniciar o Bedrock.' >&2; \
               exit 1; \
             fi && \
             if [ -f /opt/bedrock-server/logs/bedrock.log ]; then \
               tail -n 50 /opt/bedrock-server/logs/bedrock.log; \
             elif [ -f /root/MinecraftServer/logging/bedrock.log ]; then \
               tail -n 50 /root/MinecraftServer/logging/bedrock.log; \
             else \
               echo '[warn] Log bedrock.log não encontrado em /opt/bedrock-server/logs nem /root/MinecraftServer/logging'; \
             fi"

      - name: Validar publicação remota (diretórios finais do mundo)
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "set -euo pipefail && \
             bp_found=0 && \
             for dir in '$WORLD_BP_DIR'/BP_*; do \
               [ -d \"\$dir\" ] || continue; \
               bp_found=1; \
               echo \"Behavior pack em: \$dir\"; \
               ls -lah \"\$dir\"; \
             done && \
             rp_found=0 && \
             for dir in '$WORLD_RP_DIR'/RP_*; do \
               [ -d \"\$dir\" ] || continue; \
               rp_found=1; \
               echo \"Resource pack em: \$dir\"; \
               ls -lah \"\$dir\"; \
             done && \
             [ \"\$bp_found\" -eq 1 ] && \
             [ \"\$rp_found\" -eq 1 ]"

      - name: Validar sincronização (falhar se não refletiu no mundo)
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "set -euo pipefail && REMOTE_DIR='$REMOTE_DIR' WORLD_BP_DIR='$WORLD_BP_DIR' WORLD_RP_DIR='$WORLD_RP_DIR' python3 -" <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          remote_dir = Path(os.environ["REMOTE_DIR"])
          world_bp_dir = Path(os.environ["WORLD_BP_DIR"])
          world_rp_dir = Path(os.environ["WORLD_RP_DIR"])

          checks = []
          checks.extend(
              ("BP", manifest.parent, world_bp_dir / manifest.parent.name)
              for manifest in sorted((remote_dir / "packs").glob("BP_*/manifest.json"))
          )
          checks.extend(
              ("RP", manifest.parent, world_rp_dir / manifest.parent.name)
              for manifest in sorted((remote_dir / "packs").glob("RP_*/manifest.json"))
          )

          if not checks:
              raise RuntimeError("Nenhum pack BP_/RP_ encontrado para validar.")

          def sha256(path: Path) -> str:
              h = hashlib.sha256()
              with path.open("rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def load_manifest(path: Path) -> tuple[str, list[int]]:
              data = json.loads(path.read_text(encoding="utf-8"))
              header = data.get("header", {})
              pack_id = header.get("uuid")
              version = header.get("version")
              if not pack_id or not isinstance(version, list):
                  raise RuntimeError(f"Manifest inválido: {path}")
              return pack_id, version

          for label, src_dir, dst_dir in checks:
              src_manifest = src_dir / "manifest.json"
              dst_manifest = dst_dir / "manifest.json"

              if not src_manifest.exists():
                  raise RuntimeError(f"[{label}] Manifest de origem ausente: {src_manifest}")
              if not dst_manifest.exists():
                  raise RuntimeError(f"[{label}] Manifest de destino ausente: {dst_manifest}")

              src_id, src_version = load_manifest(src_manifest)
              dst_id, dst_version = load_manifest(dst_manifest)

              if src_id != dst_id or src_version != dst_version:
                  raise RuntimeError(
                      f"[{label}] UUID/versão divergente (origem={src_id} {src_version}, destino={dst_id} {dst_version})"
                  )

              src_hash = sha256(src_manifest)
              dst_hash = sha256(dst_manifest)
              if src_hash != dst_hash:
                  raise RuntimeError(f"[{label}] Conteúdo do manifest diverge após sync.")

              print(f"[ok] {label} sincronizado: uuid={dst_id} version={dst_version}")

          print("[ok] Sincronização do mundo confirmada.")
          PY

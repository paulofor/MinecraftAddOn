name: Publicar no servidor VPS

on:
  workflow_dispatch:
  push:
    branches:
      - work
      - main
    paths:
      - 'packs/**'
      - '.github/workflows/publish-server.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: 186.202.209.206
      VPS_USER: root
      VPS_PORT: 22
      REMOTE_DIR: ${{ vars.VPS_DESTINO || '/root/MinecraftAddOn' }}
      WORLD_DIR: ${{ vars.BEDROCK_WORLD_DIR || '/root/bedrock-server/worlds/Bedrock level' }}
      WORLD_BP_DIR: ${{ vars.BEDROCK_WORLD_BP_DIR || '/root/bedrock-server/worlds/Bedrock level/behavior_packs' }}
      WORLD_RP_DIR: ${{ vars.BEDROCK_WORLD_RP_DIR || '/root/bedrock-server/worlds/Bedrock level/resource_packs' }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar dependência (rsync)
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Configurar chave SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Preparar pasta remota
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "mkdir -p '$REMOTE_DIR/packs' '$WORLD_BP_DIR' '$WORLD_RP_DIR'"

      - name: Publicar packs no servidor
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p $VPS_PORT" \
            packs/ "$VPS_USER@$VPS_HOST:$REMOTE_DIR/packs/"

      - name: Promover packs para o mundo Bedrock
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "rsync -az --delete '$REMOTE_DIR/packs/BP_QuadroIdeias/' '$WORLD_BP_DIR/BP_QuadroIdeias/' && \
             rsync -az --delete '$REMOTE_DIR/packs/RP_QuadroIdeias/' '$WORLD_RP_DIR/RP_QuadroIdeias/'"

      - name: Validar publicação remota (diretórios finais do mundo)
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "echo 'Behavior packs em: $WORLD_BP_DIR/BP_QuadroIdeias' && \
             ls -lah '$WORLD_BP_DIR/BP_QuadroIdeias' && \
             echo 'Resource packs em: $WORLD_RP_DIR/RP_QuadroIdeias' && \
             ls -lah '$WORLD_RP_DIR/RP_QuadroIdeias'"

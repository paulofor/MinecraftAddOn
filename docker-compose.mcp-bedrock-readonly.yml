services:
  bedrock-mcp-readonly:
    build:
      context: .
      dockerfile: infra/mcp-bedrock-readonly/Dockerfile
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      - ALLOWED_ROOTS=${ALLOWED_ROOTS:-/root/MinecraftServer,/root/MinecraftServer/logging,/root/MinecraftServer/logging/bedrock.log,/root/MinecraftAddOn}
      - READ_CMD_TIMEOUT=${READ_CMD_TIMEOUT:-10}
      - MAX_FILE_BYTES=${MAX_FILE_BYTES:-200000}
      - MCP_TRANSPORT=${MCP_TRANSPORT:-http}
      - MCP_HTTP_HOST=${MCP_HTTP_HOST:-0.0.0.0}
      - MCP_HTTP_PORT=${MCP_HTTP_PORT:-8765}
    ports:
      - ${MCP_HOST_PORT:-80}:${MCP_HTTP_PORT:-8765}
    volumes:
      - ${BEDROCK_ROOT:-/root/MinecraftServer}:/root/MinecraftServer:ro
      - ${HOST_REPO_DIR:-/root/MinecraftAddOn}:/root/MinecraftAddOn:ro

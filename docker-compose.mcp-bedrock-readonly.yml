services:
  bedrock-mcp-readonly:
    build:
      context: .
      dockerfile: infra/mcp-bedrock-readonly/Dockerfile
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      - ALLOWED_ROOTS=${ALLOWED_ROOTS:-/data/minecraftserver,/data/logging,/data/repo}
      - READ_CMD_TIMEOUT=${READ_CMD_TIMEOUT:-10}
      - MAX_FILE_BYTES=${MAX_FILE_BYTES:-200000}
      - MCP_TRANSPORT=${MCP_TRANSPORT:-http}
      - MCP_HTTP_HOST=${MCP_HTTP_HOST:-0.0.0.0}
      - MCP_HTTP_PORT=${MCP_HTTP_PORT:-8765}
    ports:
      - ${MCP_HOST_PORT:-80}:${MCP_HTTP_PORT:-8765}
    volumes:
      - ${BEDROCK_ROOT:-/root/MinecraftServer}:/data/minecraftserver:ro
      - ${HOST_LOG_DIR:-/root/MinecraftServer/logging}:/data/logging:ro
      - ${HOST_REPO_DIR:-/root/MinecraftAddOn}:/data/repo:ro
